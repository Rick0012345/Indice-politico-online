services:
  app:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - VITE_USE_POLLING=true
      - VITE_API_PROXY_TARGET=http://api:4000
      - APP_DB_HOST=db
      - APP_DB_PORT=5432
      - APP_DB_USER=app
      - APP_DB_PASSWORD=app
      - APP_DB_NAME=app
      - DATABASE_URL=postgresql://app:app@db:5432/app?schema=public
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    stdin_open: true
    tty: true

  api:
    build:
      context: .
      target: development
    command: npm run api:dev
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    environment:
      - HOST=0.0.0.0
      - PORT=4000
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - APP_DB_HOST=db
      - APP_DB_PORT=5432
      - APP_DB_USER=app
      - APP_DB_PASSWORD=app
      - APP_DB_NAME=app
      - DATABASE_URL=postgresql://app:app@db:5432/app?schema=public
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=app
    volumes:
      - app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 20

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "${N8N_HOST_PORT:-5679}:5678"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=app
      - DB_POSTGRESDB_USER=app
      - DB_POSTGRESDB_PASSWORD=app
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-local-development-encryption-key-change-me}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:${N8N_HOST_PORT:-5679}/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    env_file:
      - .env

volumes:
  app_node_modules:
  api_node_modules:
  n8n_data:
  app_db_data:
