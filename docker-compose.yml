services:
  app:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - VITE_USE_POLLING=true
      - APP_DB_HOST=n8n-db
      - APP_DB_PORT=5432
      - APP_DB_USER=n8n
      - APP_DB_PASSWORD=n8n
      - APP_DB_NAME=catalogo_politico
      - DATABASE_URL=postgresql://n8n:n8n@n8n-db:5432/catalogo_politico?schema=public
    env_file:
      - .env
    stdin_open: true
    tty: true

  n8n-db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n
      - POSTGRES_DB=n8n
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
      - ./prisma/migrations/20240101000000_initial_schema/migration.sql:/docker-entrypoint-initdb.d/001_app_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 20

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "${N8N_HOST_PORT:-5679}:5678"
    depends_on:
      n8n-db:
        condition: service_healthy
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-n8n}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-local-development-encryption-key-change-me}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:${N8N_HOST_PORT:-5679}/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    env_file:
      - .env

volumes:
  app_node_modules:
  n8n_data:
  n8n_db_data:
